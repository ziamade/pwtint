media:
  - name: images
    label: Images
    input: src/assets/images
    output: /assets/images
    extensions: [jpg, jpeg, png, gif, webp, svg]
  - name: service-images
    label: Service Images
    input: src/assets/images/services
    output: /assets/images/services
    extensions: [jpg, jpeg, png, gif, webp, svg]
  - name: videos
    label: Videos
    input: src/assets/videos
    output: /assets/videos
    extensions: [mp4, webm]

settings:
  content:
    merge: true

content:
  # ── Alert Banner ───────────────────────────────────────────────────────────
  - name: alert
    label: Alert Banner
    type: file
    path: src/data/alert.json
    format: json
    fields:
      - name: enabled
        label: Enable Banner
        type: boolean
        default: false
      - name: text
        label: Message
        type: string
        required: false
        description: "The message shown in the banner across the top of the site."
      - name: startDate
        label: Start Date
        type: date
        required: false
        description: "Leave blank to show immediately when enabled."
      - name: endDate
        label: End Date
        type: date
        required: false
        description: "Leave blank to show indefinitely."

  # ── Contact Info ───────────────────────────────────────────────────────────
  - name: contact
    label: Contact Info
    type: file
    path: src/data/contact.json
    format: json
    fields:
      - name: email
        label: Email Address
        type: string
        description: "Business email shown in the footer and contact section. Example: info@yourbusiness.com"
      - name: phoneForTel
        label: Phone Number
        type: string
        description: "Used for click-to-call links and automatically formatted as (555) 555-5555. Digits and dashes only. Example: 209-954-9896"

  # ── Location & Maps ────────────────────────────────────────────────────────
  - name: location
    label: Location & Maps
    type: file
    path: src/data/location.json
    format: json
    fields:
      - name: address
        label: Street Address
        type: string
        description: "Street address shown in the footer and contact section. Example: 8829 Davis Road STE 3"
      - name: city
        label: City
        type: string
        description: "City name used in the address display and throughout the site. Example: Stockton"
      - name: state
        label: State
        type: string
        description: "Two-letter state abbreviation. Example: CA"
      - name: zip
        label: ZIP Code
        type: string
        description: "5-digit ZIP code. Example: 95209"
      - name: country
        label: Country Code
        type: string
        default: "US"
        description: "Two-letter country code for structured data (schema.org). Example: US"
      - name: mapLink
        label: Google Maps Link
        type: string
        description: "Full Google Maps URL. Go to maps.google.com, search your address, click Share, then Copy link."

  # ── Business Hours ─────────────────────────────────────────────────────────
  - name: hours
    label: Business Hours
    type: file
    path: src/data/hours.json
    format: json
    fields:
      - name: days
        label: Business Hours
        type: object
        list:
          collapsible: false
        fields:
          - name: day
            label: Day
            type: string
            readonly: true
          - name: open
            label: Opens
            type: string
            required: false
          - name: close
            label: Closes
            type: string
            required: false

  # -- About Section
  - name: about
    label: About Section
    type: file
    path: src/data/about.json
    format: json
    fields:
      - { name: heading, label: Section Heading, type: string }
      - name: text
        label: About Text
        type: text

  # -- FAQ
  - name: faq
    label: FAQ
    type: file
    path: src/data/faq.json
    format: json
    fields:
      - name: items
        label: Questions
        type: object
        list:
          collapsible: false
        fields:
          - { name: question, label: Question, type: string }
          - { name: answer, label: Answer, type: text }

  # -- Photo Gallery
  - name: gallery
    label: Photo Gallery
    type: file
    path: src/data/gallery.json
    format: json
    fields:
      - name: images
        label: Photos
        type: object
        list:
          collapsible: false
        fields:
          - { name: url, label: Image, type: image }
          - { name: alt, label: Description, type: string }

  # ── Trust Bar ─────────────────────────────────────────────────────────────
  - name: trustbar
    label: Trust Bar Stats
    type: file
    path: src/data/trustbar.json
    format: json
    fields:
      - name: items
        label: Stats
        type: object
        list:
          collapsible: false
        fields:
          - { name: number, label: "Number/Value", type: string }
          - { name: label, label: Label, type: string }

  # ── Services ───────────────────────────────────────────────────────────────
  - name: services
    label: "Services (max 6)"
    type: collection
    path: src/content/services
    extension: md
    format: yaml-frontmatter
    filename: "{order}-{fields.title | slugify}"
    media:
      input: src/assets/images/services
      output: /assets/images/services
    view:
      primary: title
      fields: [title, order]
      sort: [order]
      default:
        sort: order
        order: asc
    fields:
      - name: title
        label: Title
        type: string
      - name: description
        label: Description
        type: text
      - name: beforeImage
        label: Before Image
        type: image
      - name: afterImage
        label: After Image (optional)
        type: image
        required: false
        description: "If provided, the card will show this image on hover."
      - name: order
        label: Display Order
        type: number
        default: 1
        description: "Lower numbers appear first (1 = first card). Maximum 6 services total."
